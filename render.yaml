services:
  - type: web
    name: catalyst-tracker
    env: node
    plan: free
    buildCommand: npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 5000
    repo: https://github.com/Saurabh-Jasawat/Catalyst.git
    branch: develop

